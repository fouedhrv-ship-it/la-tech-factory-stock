name: Actualisation stock La Tech Factory

on:
  schedule:
    # 4h05 UTC = 6h05 heure de Paris en été (CEST, UTC+2).
    # En hiver (CET, UTC+1) ça tombera à 5h05 heure de Paris.
    - cron: "5 4 * * *"
  workflow_dispatch: {}

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock & photo check
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python check_stock.py
